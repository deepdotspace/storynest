<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="storynest">
  <!-- Sticker tile: rounded square, ink hairline, coral fill matching
       the brand's coral accent. Same recipe as the in-app sticker
       frames so the favicon reads as "by the same hand". -->
