<!DOCTYPE html>
<!--
  Active theme is set on the <html> element below.
  To switch themes, change `data-theme` to any id defined in src/themes.ts.
  Color values per theme live in src/themes.css.
-->
<html lang="en" data-theme="storynest">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>storynest — bedtime stories made just for them</title>
    <meta
      name="description"
      content="Tell us your idea. We illustrate every page and narrate it aloud. A new picture book in about a minute."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="storynest" />
    <meta property="og:url" content="https://storynest.app.space" />
    <meta property="og:title" content="storynest — bedtime stories made just for them" />
    <meta
      property="og:description"
      content="Tell us your idea. We illustrate every page and narrate it aloud. A new picture book in about a minute."
    />
    <meta property="og:image" content="https://storynest.app.space/og-image.png" />
    <meta property="og:image:alt" content="storynest — gallery of children's storybooks made by the community" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="storynest — bedtime stories made just for them" />
    <meta
      name="twitter:description"
      content="Tell us your idea. We illustrate every page and narrate it aloud. A new picture book in about a minute."
    />
    <meta name="twitter:image" content="https://storynest.app.space/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&family=Caveat:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
